name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from example
        run: |
          cp .env.example .env
          # Override with safe CI values
          echo "DATABASE_URL=postgresql://art_buddy:art_buddy_password@localhost:5433/art_buddy_db" >> .env
          echo "SECRET_KEY=ci-test-secret-key-not-for-production" >> .env
          echo "OPENAI_API_KEY=sk-placeholder-not-used-in-unit-tests" >> .env
          echo "ENVIRONMENT=test" >> .env

      - name: Run unit tests
        run: pytest tests/ -q --tb=short
        env:
          DATABASE_URL: postgresql://art_buddy:art_buddy_password@localhost:5433/art_buddy_db
          SECRET_KEY: ci-test-secret-key-not-for-production
          OPENAI_API_KEY: sk-placeholder-not-used-in-unit-tests
          ENVIRONMENT: test

  # ── Frontend: type-check + build ─────────────────────────────────────────
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
