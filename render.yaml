databases:
  - name: art-buddy-db
    databaseName: art_buddy_db
    user: art_buddy
    plan: free

services:
  # ── Backend ──────────────────────────────────────────────────────────────
  - type: web
    name: art-buddy-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: art-buddy-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # fill in via Render dashboard
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: FRONTEND_URL
        fromService:
          name: art-buddy-frontend
          type: web
          property: url

  # ── Frontend ─────────────────────────────────────────────────────────────
  - type: web
    name: art-buddy-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: art-buddy-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
